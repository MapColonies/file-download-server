global:
  cloudProvider: {}
  tracing: {}
  metrics: {}
  environment: ""
  serviceUrls: {}
  authentication:
    jwtPublicKeySecretName: map-colonies-jwks
  storage:
    gpkgProvider: ""
    fs:
      internalPvc:
        enabled: false
        name: ""
        gpkgSubPath: ""
  ingress:
    domain: "example.com"

enabled: true
environment: development
replicaCount: 1
initialDelaySeconds: 30
nodePort: 30030 #for minikube deployment only
resetOnConfigChange: true
splunkIndex: ""

cloudProvider:
  dockerRegistryUrl: my-registry-url.io
  imagePullSecretName: pullSecretName
  flavor: openshift

serviceUrls:
  ngnixS3Gateway: ""

storage:
  gpkgProvider: ""
  fs:
    internalPvc:
      enabled: false
      name: ""
      gpkgSubPath: ""
authentication:
  opa:
    enabled: false
    customHeaderName: ""

# add pod annotations
# example:
# podAnnotations:
# annotation1: annotation-value-1
# annotation2: annotation-value-2
podAnnotations: {}

env:
  port: 80
  targetPort: 8080
  externalPort: 8080
  protocol: TCP
  tracing:
    url: http://localhost:55681/v1/trace

nginx:
  enabled: true
  fullnameOverride: ""
  nginx:
    extensions:
      location:
        enabled: true
        fileName: downloads-location.conf
  authorization:
    enabled: false
  replicaCount: 1
  image:
    repository: common/nginx
    tag: "v2.1.5"
  port: 8080
  targetPort: 8080
  nodePort: 30003

  backend:
    enabled: false

  prometheusExporter:
    # -- Enable or disable the Prometheus exporter sidecar
    enabled: true
    image:
      # -- Docker image name for the Prometheus exporter
      repository: common/nginx/nginx-prometheus-exporter
      # -- Docker image tag for the Prometheus exporter
      tag: latest
      # -- Image pull policy for the Prometheus exporter
      pullPolicy: IfNotPresent
    resources:
      # -- Enable or disable resource limits and requests
      enabled: true
      value:
        limits:
          # -- CPU limit for the main container
          cpu: 100m
          # -- Memory limit for the main container
          memory: 128Mi
        requests:
          # -- CPU request for the main container
          cpu: 100m
          # -- Memory request for the main container
          memory: 128Mi

  opentelemetry:
    serviceName: ""
    exporterHost: ""
    exporterPort: 4317
    samplerMethod: "AlwaysOff"
    ratio: 10

  extraVolumes:
    - name: nginx-config
      configMap:
        name: "{{ .Release.Name }}-files-server-nginx-configmap"
    - name: gpkgs-storage
      persistentVolumeClaim:
        claimName: "internal-pvc-nfs"

  extraVolumeMounts:
    - name: nginx-config
      mountPath: "/etc/nginx/conf.d/extensions/downloads-location.conf"
      subPath: downloads-location.conf
    - name: gpkgs-storage
      mountPath: /usr/share/nginx/html/downloads
      subPath: gpkgs

  resources:
    enabled: true
    value:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi

  route:
    enabled: false
    routesMapping:
      - path: /
        host:
    timeout:
      enabled: false # defaults to 30s by openshift
      duration: 60s # supported units (us, ms, s, m, h, d)
    tls:
      enabled: false
      useCerts: false
      certificate: ""
      key: ""
      caCertificate: ""
  ingress:
    enabled: false
    ingressClassName: nginx
    additionalAnnotations: {}
    ingressMapping:
      - path: /
        host: ""
        pathType: Prefix
    domain: ""
    tls:
      enabled: false
      secretName: ""
    cors:
      enabled: true
      origin: "*"
